services:
  pegger-hub:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
      args:
        DEPLOY_REVISION: ${DEPLOY_REVISION:-development}
    image: pegger-hub:${DEPLOY_REVISION:-development}
    container_name: pegger-hub
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    labels:
      org.opencontainers.image.revision: ${DEPLOY_REVISION:-development}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    networks:
      - edge

networks:
  edge:
    external: true
    name: spotonsight_proxy
