name: CI and Deploy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: Generate Linux visual baselines without deploying
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run type checks
        run: npm run typecheck

      - name: Build production bundle
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser visual tests
        if: github.event_name != 'workflow_dispatch' || inputs.update_snapshots != true
        run: npm run test:e2e

      - name: Generate Linux visual baselines
        if: github.event_name == 'workflow_dispatch' && inputs.update_snapshots
        run: npm run test:e2e:update

      - name: Upload Linux visual baselines
        if: github.event_name == 'workflow_dispatch' && inputs.update_snapshots
        uses: actions/upload-artifact@v7
        with:
          name: pegger-linux-visual-baselines
          path: tests/e2e/hub.e2e.spec.js-snapshots/*-linux.png
          retention-days: 1

  deploy-production:
    name: Deploy production
    needs: verify
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master' && inputs.update_snapshots != true)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write
    concurrency:
      group: pegger-production
      cancel-in-progress: false
    environment:
      name: production
      url: https://pegger.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check release is current
        id: release
        shell: bash
        run: |
          current_sha="$(git ls-remote origin refs/heads/master | cut -f1)"
          if [[ "$current_sha" == "$GITHUB_SHA" ]]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping superseded revision $GITHUB_SHA; master is $current_sha"
          fi

      - name: Start SSH agent
        if: steps.release.outputs.deploy == 'true'
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        if: steps.release.outputs.deploy == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          EXPECTED_VPS_FINGERPRINT: SHA256:Feh0miKZx7Upiy4pYYqr6MaskLED8K1MDbkALuJ3kB8
        run: |
          : "${VPS_HOST:?VPS_HOST secret is required}"
          mkdir -p ~/.ssh
          ssh-keygen -R "$VPS_HOST" || true
          ssh-keyscan -H "$VPS_HOST" > /tmp/vps_known_hosts
          ssh-keygen -lf /tmp/vps_known_hosts | awk '{print $2}' | grep -Fx "$EXPECTED_VPS_FINGERPRINT"
          cat /tmp/vps_known_hosts >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        if: steps.release.outputs.deploy == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          : "${VPS_HOST:?VPS_HOST secret is required}"
          : "${VPS_USER:?VPS_USER secret is required}"
          ssh "$VPS_USER@$VPS_HOST" "
            set -eu
            cd /opt/pegger-hub
            git fetch origin master --prune
            git checkout master
            git pull --ff-only origin master
            test \"\$(git rev-parse HEAD)\" = \"$GITHUB_SHA\"
            test -z \"\$(git status --porcelain --untracked-files=no)\"
            DEPLOY_REVISION=\"$GITHUB_SHA\" bash ./scripts/deploy-production.sh
          "
